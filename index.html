<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:monospace;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
color:#22c55e;
overflow:hidden;
}

/* scan */
body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:repeating-linear-gradient(
to bottom,
rgba(0,255,0,0.05) 0px,
rgba(0,255,0,0.05) 1px,
transparent 1px,
transparent 3px
);
animation:scan 4s linear infinite;
}

@keyframes scan{
0%{transform:translateY(0);}
100%{transform:translateY(100%);}
}

.container{
background:rgba(0,0,0,0.85);
border:1px solid #22c55e;
padding:25px;
width:320px;
border-radius:10px;
box-shadow:0 0 20px #22c55e;
text-align:center;
}

h2{
margin-bottom:15px;
text-shadow:0 0 10px #22c55e;
}

input{
width:100%;
padding:12px;
background:black;
border:1px solid #22c55e;
color:#22c55e;
border-radius:6px;
margin-bottom:15px;
outline:none;
transition:0.3s;
}

input:focus{
box-shadow:0 0 10px #22c55e;
border-color:#4ade80;
}

button{
width:100%;
padding:10px;
background:black;
border:1px solid #22c55e;
color:#22c55e;
cursor:pointer;
}

button:hover{
background:#22c55e;
color:black;
}

.switch{
position:relative;
display:inline-block;
width:70px;
height:36px;
margin-top:20px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
background:#111;
border:1px solid #22c55e;
top:0;
left:0;
right:0;
bottom:0;
border-radius:50px;
}

.slider:before{
content:"";
position:absolute;
height:28px;
width:28px;
left:4px;
bottom:4px;
background:#22c55e;
border-radius:50%;
transition:.3s;
}

input:checked + .slider:before{
transform:translateX(34px);
}

#status{
margin-top:15px;
font-size:13px;
}

.log{
margin-top:15px;
height:90px;
overflow:auto;
font-size:12px;
text-align:left;
border:1px solid #22c55e;
padding:10px;
background:black;
}

.bar-wrap{
margin-top:10px;
border:1px solid #22c55e;
height:8px;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
}

#percent{
font-size:12px;
margin-top:5px;
}

.info,.admin{
margin-top:10px;
font-size:12px;
text-align:left;
border:1px solid #22c55e;
padding:10px;
background:black;
line-height:1.5;
}

#toggleArea{
display:none;
}

</style>
</head>

<body>

<div class="container">

<div id="loginArea">
<h2>⚡ SYSTEM ACCESS</h2>
<input id="key" placeholder="ENTER ACCESS KEY">
<button onclick="verifyKey()">AUTHENTICATE</button>
</div>

<div id="toggleArea">

<h2>⚙ CONTROL PANEL</h2>

<label class="switch">
<input type="checkbox" onchange="toggle(this)">
<span class="slider"></span>
</label>

<p id="status">STATUS: OFFLINE</p>

<div class="log" id="log">> waiting...</div>

<div class="bar-wrap"><div class="bar" id="bar"></div></div>
<p id="percent">0%</p>

<div class="info" id="info">
> IP: 0.0.0.0 <br>
> STATUS: SAFE
</div>

<div class="admin">
> ADMIN: Văn Quý <br>
> ROLE: App support <br>
> VERSION: v4.0<br>
> CONTACT: zalo/0346044653
</div>

</div>
</div>

<script>

let validKeys=["VIP123","TEST999"];

/* JSON PRO */
let config={
aim:{
enabled:true,
aimlock:true,
sensitivity:0.75
},
system:{
cpu:"Intel i7",
fps:120,
mode:"auto"
},
source:{
url:"https://dl-core.cdn.freefiremobile.com/live/ABHotUpdates/ios/1.123.2/fileinfo"
}
};

let systemRunning=false;
let systemLoop;

/* log */
function log(msg){
let time=new Date().toLocaleTimeString();
let box=document.getElementById("log");
box.innerHTML += "<br>["+time+"] > "+msg;
box.scrollTop=box.scrollHeight;
}

/* fake IP */
function randomIP(){
return Math.floor(Math.random()*255)+"."+
Math.floor(Math.random()*255)+"."+
Math.floor(Math.random()*255)+"."+
Math.floor(Math.random()*255);
}

function loadFakeInfo(){
document.getElementById("info").innerHTML =
"> IP: "+randomIP()+"<br>> STATUS: PROTECTED";
}

/* load link */
async function loadExternalData(){
try{
log("[NET] connecting...");
let res=await fetch(config.source.url);
let data=await res.text();
log("[NET] loaded ✅");
log("[DATA] "+data.length+" bytes");
log("[SYSTEM] parsing...");
setTimeout(()=>log("[SYSTEM] updated ✔"),500);
}catch(e){
log("[ERROR] load failed ❌");
}
}

/* JSON RUN */
function runSystem(){

systemLoop=setInterval(()=>{

if(!systemRunning) return;

let states=["idle","searching","tracking","locked"];
let state=states[Math.floor(Math.random()*states.length)];

if(config.aim.enabled){

let target=Math.floor(Math.random()*1000);
log("[AIM] target ID: "+target);

if(config.aim.aimlock && state==="locked"){
log("[AIMLOCK] locked 🎯");
}

if(state==="tracking"){
log("[AIM] tracking | sens "+config.aim.sensitivity);
}
}

log("[CPU] "+config.system.cpu);
log("[FPS] "+config.system.fps);

if(config.system.mode==="auto"){
log("[SYSTEM] AUTO ⚙️");
}

let actions=[
"scanning...",
"reading memory...",
"syncing...",
"updating..."
];

log(actions[Math.floor(Math.random()*actions.length)]);
log("[STATE] "+state.toUpperCase());

},1200);

}

/* login mượt */
function verifyKey(){

let keyInput=document.getElementById("key");
let key=keyInput.value.trim();

if(!key){
alert("Nhập key ❗");
return;
}

log("checking key...");
keyInput.disabled=true;

setTimeout(()=>{

if(validKeys.includes(key)){

log("access granted ✅");
log("admin verified");

document.getElementById("loginArea").style.opacity="0";

setTimeout(()=>{
document.getElementById("loginArea").style.display="none";
document.getElementById("toggleArea").style.display="block";
},300);

setTimeout(loadFakeInfo,500);

}else{

log("access denied ❌");
alert("Key sai ❌");
keyInput.disabled=false;

}

},600);
}

/* enter login */
document.getElementById("key").addEventListener("keypress",e=>{
if(e.key==="Enter") verifyKey();
});

/* toggle */
function toggle(el){

let status=document.getElementById("status");
let bar=document.getElementById("bar");
let percent=document.getElementById("percent");

if(el.checked){

status.innerText="STATUS: LOADING...";
log("starting system...");
log("loading JSON...");

let i=0;

let run=setInterval(()=>{

i++;
bar.style.width=i+"%";
percent.innerText=i+"%";

if(i==30) log("injecting...");
if(i==60) log("modules...");
if(i==90) log("finalizing...");

if(i>=100){
clearInterval(run);

status.innerText="STATUS: ONLINE";

systemRunning=true;
runSystem();
loadExternalData();

log("system running 🚀");

alert("đã bật✅");
}

},25);

}else{

status.innerText="STATUS: OFFLINE";
bar.style.width="0%";
percent.innerText="0%";

systemRunning=false;
clearInterval(systemLoop);

log("system stopped ❌");
alert("đã tắt ❌");

}
}

/* chặn zoom */
document.addEventListener('wheel',e=>{
if(e.ctrlKey) e.preventDefault();
},{passive:false});

document.addEventListener('keydown',e=>{
if((e.ctrlKey||e.metaKey)&&['+','-','0'].includes(e.key)){
e.preventDefault();
}
});

</script>

</body>
</html>
